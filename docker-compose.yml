version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rekall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rekall}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rekall_secret}
      POSTGRES_DB: ${DB_NAME:-rekall_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rekall} -d ${DB_NAME:-rekall_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rekall_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_ENV: ${SERVER_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-rekall}
      DB_PASSWORD: ${DB_PASSWORD:-rekall_secret}
      DB_NAME: ${DB_NAME:-rekall_db}
      DB_SSL_MODE: disable
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-rekall}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      # Platform admin (boot-time reconciliation)
      PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}
      PLATFORM_ADMIN_BOOTSTRAP_PASSWORD: ${PLATFORM_ADMIN_BOOTSTRAP_PASSWORD:-}
      # SMTP → Mailpit (local dev)
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: ${SMTP_FROM:-noreply@rekall.local}
      SMTP_TLS: "false"
      # ASR (live-captions) — feature-flagged off by default. Set
      # ASR_FEATURE_ENABLED=true and bring up the `asr` profile to enable.
      ASR_FEATURE_ENABLED: ${ASR_FEATURE_ENABLED:-false}
      ASR_GRPC_ADDR: ${ASR_GRPC_ADDR:-asr:9090}
      ASR_TOKEN_SECRET: ${ASR_TOKEN_SECRET:-}
      ASR_WS_URL_BASE: ${ASR_WS_URL_BASE:-ws://localhost:8081}
      ASR_TOKEN_DEFAULT_TTL: ${ASR_TOKEN_DEFAULT_TTL:-3m}
      ASR_TOKEN_MAX_TTL: ${ASR_TOKEN_MAX_TTL:-5m}
      # Intellikat (insights) publisher — feature-flagged off by default.
      # Set INTELLIKAT_PUBLISH_ENABLED=true AND provide either a
      # SERVICEBUS_CONNECTION_STRING (dev) or SERVICEBUS_FULLY_QUALIFIED_NAMESPACE
      # (prod, managed identity) to enable. The publisher will no-op silently
      # otherwise, so the backend ships without intellikat deployed.
      INTELLIKAT_PUBLISH_ENABLED: ${INTELLIKAT_PUBLISH_ENABLED:-false}
      SERVICEBUS_INSIGHTS_TOPIC: ${SERVICEBUS_INSIGHTS_TOPIC:-rekall.transcript.insights}
      SERVICEBUS_FULLY_QUALIFIED_NAMESPACE: ${SERVICEBUS_FULLY_QUALIFIED_NAMESPACE:-}
      SERVICEBUS_CONNECTION_STRING: ${SERVICEBUS_CONNECTION_STRING:-}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: rekall_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — backend sends here
      - "8025:8025"   # Web UI — open http://localhost:8025 to inspect emails
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: rekall_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ─── ASR (C++ / whisper.cpp) ───────────────────────────────────────────────
  # Optional. Build with:  docker compose build asr
  # Run with:              docker compose --profile asr up -d
  # The backend reads ASR_FEATURE_ENABLED=false by default; enable it only
  # when the asr container is up and the model files are mounted.
  asr:
    profiles: ["asr"]
    build:
      context: ./asr
      dockerfile: docker/Dockerfile
      args:
        # Build-time engine selection — "both" (default), "local", or "openai".
        # Use "openai" together with REKALL_ASR_IMAGE_TAG=openai to produce a
        # slim cloud-only image that skips the whisper.cpp compile.
        REKALL_ASR_ENGINE: ${REKALL_ASR_ENGINE:-both}
    image: rekall-asr:${REKALL_ASR_IMAGE_TAG:-latest}
    container_name: rekall_asr
    restart: unless-stopped
    environment:
      ASR_TOKEN_SECRET: ${ASR_TOKEN_SECRET:?ASR_TOKEN_SECRET is required}
      # Run-time engine. Must match (or be a subset of) REKALL_ASR_ENGINE above.
      ASR_ENGINE_MODE: ${ASR_ENGINE_MODE:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASR_ALLOW_OPENAI_IN_PRODUCTION: ${ASR_ALLOW_OPENAI_IN_PRODUCTION:-false}
      ASR_ENGINE_OPENAI_BASE_URL: ${ASR_ENGINE_OPENAI_BASE_URL:-}
      ASR_ENGINE_OPENAI_MODEL: ${ASR_ENGINE_OPENAI_MODEL:-whisper-1}
      ASR_ENGINE_OPENAI_LANGUAGE: ${ASR_ENGINE_OPENAI_LANGUAGE:-en}
      ASR_ENGINE_OPENAI_RESPONSE_FORMAT: ${ASR_ENGINE_OPENAI_RESPONSE_FORMAT:-verbose_json}
      ASR_ENGINE_OPENAI_REQUEST_TIMEOUT_SECONDS: ${ASR_ENGINE_OPENAI_REQUEST_TIMEOUT_SECONDS:-30}
      ASR_ENGINE_OPENAI_MAX_SEGMENT_SECONDS: ${ASR_ENGINE_OPENAI_MAX_SEGMENT_SECONDS:-60}
      ASR_ENGINE_OPENAI_MIN_SEGMENT_SECONDS: ${ASR_ENGINE_OPENAI_MIN_SEGMENT_SECONDS:-1}
      ASR_ENGINE_OPENAI_RETRIES: ${ASR_ENGINE_OPENAI_RETRIES:-2}
      ASR_ENGINE_OPENAI_RETRY_BACKOFF_MS: ${ASR_ENGINE_OPENAI_RETRY_BACKOFF_MS:-500}
      ASR_WS_LISTEN: "0.0.0.0:8081"
      ASR_GRPC_LISTEN: "0.0.0.0:9090"
      ASR_METRICS_LISTEN: "0.0.0.0:9091"
      ASR_GRPC_BIND_ALL: "true"
      # Local-dev: backend reaches asr:9090 across the docker bridge, so the
      # gRPC port can't bind to loopback. Skip mTLS enforcement here. Do NOT
      # set this in production — provision real certs via the tls.* keys.
      ASR_ALLOW_INSECURE_GRPC: "true"
      ASR_WS_ALLOWED_ORIGINS: ${ASR_WS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ASR_ALLOW_INSECURE_WS: "true"
      ASR_LOG_LEVEL: ${ASR_LOG_LEVEL:-info}
      ASR_LOG_FORMAT: json
      # Model fallback (used when YAML loader can't populate models.entries).
      # The container ships ggml-tiny.en.bin under the mounted models volume.
      ASR_MODEL_DEFAULT_ID: ${ASR_MODEL_DEFAULT_ID:-tiny.en}
      ASR_MODEL_DEFAULT_PATH: ${ASR_MODEL_DEFAULT_PATH:-/var/lib/rekall-asr/models/ggml-tiny.en.bin}
      ASR_MODEL_DEFAULT_LANGUAGE: ${ASR_MODEL_DEFAULT_LANGUAGE:-en}
      ASR_MODEL_DEFAULT_N_THREADS: ${ASR_MODEL_DEFAULT_N_THREADS:-2}
      ASR_MODEL_DEFAULT_BEAM_SIZE: ${ASR_MODEL_DEFAULT_BEAM_SIZE:-3}
      ASR_MODEL_DEFAULT_BEST_OF: ${ASR_MODEL_DEFAULT_BEST_OF:-3}
      ASR_MODELS_DEFAULT: ${ASR_MODELS_DEFAULT:-tiny.en}
      # Lower latency knobs — emit partials more often, finalize sooner, and
      # cut the rolling audio window so each utterance ships through whisper
      # quickly. Tune up if CPU pressure becomes an issue.
      ASR_SESSION_PARTIAL_EMIT_INTERVAL_MS: ${ASR_SESSION_PARTIAL_EMIT_INTERVAL_MS:-150}
      ASR_SESSION_FINAL_EMIT_MAX_LATENCY_MS: ${ASR_SESSION_FINAL_EMIT_MAX_LATENCY_MS:-600}
      ASR_SESSION_AUDIO_WINDOW_SECONDS: ${ASR_SESSION_AUDIO_WINDOW_SECONDS:-4}
    volumes:
      - ./asr/models:/var/lib/rekall-asr/models:ro
      # Mount the live config from the host so edits take effect on `up`
      # without rebuilding the image. The Dockerfile bakes a copy at the
      # same path; this overlay wins because Docker mounts after the COPY.
      - ./asr/config/config.yaml:/etc/rekall-asr/config.yaml:ro
    ports:
      - "8081:8081"   # WebSocket data plane
      - "9091:9091"   # Prometheus metrics

  # ── Intellikat (Python) — insights consumer ────────────────────────────────
  # Hosted-mode by default (no torch in the image). Set INTELLIKAT_HF_MODE=local
  # AND build the `intellikat-local` Docker target if you want in-process
  # inference. Disabled in dev unless INTELLIKAT_PUBLISH_ENABLED=true on the
  # backend AND a Service Bus connection string is provided here.
  intellikat:
    profiles: ["intellikat"]
    build:
      context: ./intellikat
      dockerfile: docker/Dockerfile
      target: intellikat-hosted
    container_name: rekall_intellikat
    restart: unless-stopped
    depends_on:
      - db
    environment:
      INTELLIKAT_DATABASE_URL: postgresql+psycopg://intellikat:${INTELLIKAT_DB_PASSWORD:-CHANGEME}@db:5432/${DB_NAME:-rekall}
      INTELLIKAT_SERVICEBUS_NAMESPACE: ${SERVICEBUS_NAMESPACE:-rekall-dev}
      INTELLIKAT_SERVICEBUS_CONNECTION_STRING: ${SERVICEBUS_CONNECTION_STRING:-}
      INTELLIKAT_SERVICEBUS_TOPIC: ${SERVICEBUS_INSIGHTS_TOPIC:-rekall.transcript.insights}
      INTELLIKAT_SERVICEBUS_SUBSCRIPTION: intellikat
      INTELLIKAT_HF_MODE: ${INTELLIKAT_HF_MODE:-hosted}
      INTELLIKAT_HF_TOKEN: ${INTELLIKAT_HF_TOKEN:-}
      INTELLIKAT_FOUNDRY_ENDPOINT: ${INTELLIKAT_FOUNDRY_ENDPOINT:-}
      INTELLIKAT_FOUNDRY_API_KEY: ${INTELLIKAT_FOUNDRY_API_KEY:-}
      INTELLIKAT_FOUNDRY_SUMMARY_DEPLOYMENT: ${INTELLIKAT_FOUNDRY_SUMMARY_DEPLOYMENT:-gpt-4o-mini}
      INTELLIKAT_LOG_LEVEL: ${INTELLIKAT_LOG_LEVEL:-INFO}
      INTELLIKAT_LOG_FORMAT: json
      INTELLIKAT_SERVICE_ENV: development
      INTELLIKAT_PROMPT_DIR: /app/config/prompts
    ports:
      - "8090:8090"   # /healthz + /readyz

volumes:
  postgres_data:
