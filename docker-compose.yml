version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rekall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rekall}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rekall_secret}
      POSTGRES_DB: ${DB_NAME:-rekall_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rekall} -d ${DB_NAME:-rekall_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rekall_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_ENV: ${SERVER_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-rekall}
      DB_PASSWORD: ${DB_PASSWORD:-rekall_secret}
      DB_NAME: ${DB_NAME:-rekall_db}
      DB_SSL_MODE: disable
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-rekall}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      # SMTP → Mailpit (local dev)
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: ${SMTP_FROM:-noreply@rekall.local}
      SMTP_TLS: "false"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    container_name: rekall_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — backend sends here
      - "8025:8025"   # Web UI — open http://localhost:8025 to inspect emails
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_AUTH_ALLOW_INSECURE: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: rekall_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
