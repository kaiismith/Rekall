        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Insufficient role (FORBIDDEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Organization not found or access denied
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
