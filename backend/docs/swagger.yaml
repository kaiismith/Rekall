  /api/v1/organizations/{id}/invitations:
    post:
      consumes:
      - application/json
      description: Sends an email invitation to the given address. If a pending invitation
        for that email already exists it is refreshed (expiry reset, email re-sent)
        rather than creating a duplicate. Restricted to `owner` or `admin`.
      parameters:
      - description: Organization UUID
        example: 00000000-0000-0000-0000-000000000010
        format: uuid
        in: path
        name: id
        required: true
        type: string
