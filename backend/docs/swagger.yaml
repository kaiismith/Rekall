  /health:
    get:
      description: Returns 200 as long as the server process is running. Used by load
        balancers and orchestrators to verify the process is alive.
      produces:
      - application/json
      responses:
        "200":
          description: Server is alive
          headers:
            X-Request-ID:
              description: Unique request identifier
              type: string
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness probe
      tags:
      - Health
  /ready:
    get:
      description: Returns 200 when the database connection is healthy. Returns 503
        if the database is unreachable. Used by orchestrators to gate traffic until
        the service is fully initialised.
      produces:
      - application/json
      responses:
        "200":
          description: Server is ready and database is reachable
          headers:
            X-Request-ID:
              description: Unique request identifier
              type: string
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Database unavailable (DB_UNAVAILABLE)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Readiness probe
      tags:
      - Health
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Enter your JWT access token as: **Bearer &lt;token&gt;**'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
