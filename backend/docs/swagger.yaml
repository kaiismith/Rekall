    get:
      description: Upgrades the connection to WebSocket and places the caller into
        the meeting hub. The JWT access token must be passed as the `token` query
        parameter because WebSocket clients cannot send custom headers during the
        handshake. Callers who are scope members join directly; others enter the waiting
        room (knock flow).
      parameters:
      - description: Meeting code
        example: abc-defg-hij
        in: path
        name: code
        required: true
        type: string
      - description: JWT access token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Switching Protocols — WebSocket connection established
          schema:
            type: string
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Access denied (meeting ended or at capacity)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
