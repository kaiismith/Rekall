  /api/v1/organizations/{id}/members/{userID}:
    delete:
      description: Removes a user from the organization. The `owner` cannot be removed
        via this endpoint — ownership must be transferred first. Restricted to `owner`
        or `admin`.
      parameters:
      - description: Organization UUID
        example: 00000000-0000-0000-0000-000000000010
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Target user UUID
        example: 00000000-0000-0000-0000-000000000002
        format: uuid
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Member removed
        "400":
          description: Cannot remove the owner (CANNOT_REMOVE_OWNER)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Insufficient role (FORBIDDEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Organization or member not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove a member
      tags:
      - Organizations
    patch:
      consumes:
      - application/json
      description: Changes a member's role within the organization. Restricted to
        `owner` or `admin`. An `admin` cannot promote another user to `owner` or modify
        another `admin`.
      parameters:
      - description: Organization UUID
        example: 00000000-0000-0000-0000-000000000010
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Target user UUID
        example: 00000000-0000-0000-0000-000000000002
        format: uuid
        in: path
        name: userID
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMemberRoleRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Member role updated
        "400":
          description: Cannot remove or demote the owner (CANNOT_REMOVE_OWNER)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Insufficient role (FORBIDDEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Organization or member not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a member's role
      tags:
      - Organizations
  /api/v1/users:
