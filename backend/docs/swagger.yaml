host: localhost:8080
info:
  contact:
    email: engineering@rekall.io
    name: Rekall Engineering
  description: |-
    Rekall is a call intelligence platform. Record, transcribe, and analyse voice and video calls.
    This API powers the Rekall web application and is available for direct integration.

    ## Authentication
    Protected endpoints require a JWT access token obtained from `POST /api/v1/auth/login`.
    Pass the token in the `Authorization` header as `Bearer <token>`.
    The refresh token is transported exclusively via an `HttpOnly` cookie set by the server.

    ## Response Envelope
    All responses are wrapped in a standard envelope:
    - Success: `{ "success": true, "data": <T>, "meta": <pagination|null> }`
    - Error:   `{ "success": false, "error": { "code": "ERROR_CODE", "message": "Human readable message", "details": <null|object> } }`

    ## Error Codes
    Every error response includes a machine-readable `code` field. Common codes:
    `INVALID_CREDENTIALS`, `EMAIL_NOT_VERIFIED`, `EMAIL_ALREADY_REGISTERED`,
    `INVALID_OR_EXPIRED_TOKEN`, `INVALID_REFRESH_TOKEN`, `MISSING_TOKEN`, `INVALID_TOKEN`,
    `CALL_NOT_FOUND`, `USER_NOT_FOUND`, `SLUG_ALREADY_TAKEN`, `ALREADY_A_MEMBER`,
    `CANNOT_REMOVE_OWNER`, `INVITATION_EMAIL_MISMATCH`, `DEPARTMENT_NOT_FOUND`, `FORBIDDEN`
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Rekall API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password. On success returns
        a short-lived JWT **access_token** (15 min) and sets an `HttpOnly Secure SameSite=Strict`
        **refresh_token** cookie (7 days).
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authenticated successfully
          schema:
            $ref: '#/definitions/dto.LoginResponseEnvelope'
        "401":
          description: Invalid credentials (INVALID_CREDENTIALS)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Email address not yet verified (EMAIL_NOT_VERIFIED)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Sign in
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      description: Revokes the refresh token stored in the `HttpOnly` cookie and clears
        the cookie. Access tokens are stateless and expire naturally — no server-side
        invalidation is needed.
      produces:
      - application/json
      responses:
        "204":
          description: Signed out — refresh token revoked and cookie cleared
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Sign out
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: 'Returns the full profile of the authenticated user. Requires a
        valid JWT access token in the `Authorization: Bearer <token>` header.'
      produces:
      - application/json
      responses:
        "200":
          description: Authenticated user profile
          schema:
            $ref: '#/definitions/dto.UserResponseEnvelope'
        "401":
          description: Missing or invalid token (MISSING_TOKEN / INVALID_TOKEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: Email address not verified (EMAIL_NOT_VERIFIED)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Auth
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Sends a password reset link to the given email address. **Always
        returns 200 regardless of whether the email is registered** to prevent user
        enumeration. The reset link is valid for 1 hour.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email dispatched (if account exists)
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Request password reset
      tags:
      - Auth
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Sets a new password using a valid, unexpired password reset token.
        On success all active refresh tokens for the user are revoked, forcing re-login
        on all devices. Password must be 8+ characters with at least one letter and
        one digit.
      parameters:
      - description: Reset token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated — all sessions terminated
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Token invalid, expired, or already used (INVALID_OR_EXPIRED_TOKEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Validation error — password complexity requirements not met
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      description: Exchanges the `refresh_token` cookie for a new JWT access token.
        The refresh token is **rotated** — the old one is revoked and a new cookie
        is issued atomically.
      produces:
      - application/json
      responses:
        "200":
          description: New access token issued
          schema:
            $ref: '#/definitions/dto.AccessTokenResponse'
        "401":
          description: Refresh token invalid, expired, or revoked (INVALID_REFRESH_TOKEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password. The user receives
        a verification email and **cannot sign in until their email is confirmed**.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created — check email for a verification link
          schema:
            $ref: '#/definitions/dto.UserResponseEnvelope'
        "409":
          description: Email already registered (EMAIL_ALREADY_REGISTERED)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Validation error — see details for field-level errors
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /api/v1/auth/verify:
    get:
      description: Marks the user's email as verified using the single-use token delivered
        in the verification email. The token is valid for 24 hours.
      parameters:
      - description: Raw verification token from the email link
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Email verified successfully
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Token missing, invalid, expired, or already used (INVALID_OR_EXPIRED_TOKEN)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Verify email address
      tags:
      - Auth
  /api/v1/auth/verify/resend:
    post:
      consumes:
      - application/json
      description: Generates a new verification token, invalidates any prior pending
        token, and resends the verification email to the given address.
      parameters:
      - description: Email address to resend verification to
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification email sent (if the address is registered and unverified)
          schema:
            $ref: '#/definitions/dto.MessageResponse'
        "400":
          description: Email is already verified (EMAIL_ALREADY_VERIFIED)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Resend verification email
      tags:
      - Auth
  /api/v1/calls:
    get:
      description: Returns a paginated list of call records sorted by creation date
        descending. Optionally filter by status or user ID.
      parameters:
      - default: 1
        description: Page number (1-based)
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 20
        description: Number of items per page
        in: query
        maximum: 100
        minimum: 1
        name: per_page
        type: integer
      - description: Filter by call status
        enum:
        - pending
        - processing
        - done
        - failed
        in: query
        name: status
        type: string
      - description: Filter by user UUID
        format: uuid
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of calls
          schema:
            $ref: '#/definitions/dto.CallListResponse'
        "400":
          description: Invalid query parameter (e.g. malformed UUID)
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List calls
      tags:
      - Calls
    post:
      consumes:
      - application/json
      description: Creates a new call record in `pending` status. The call can be
