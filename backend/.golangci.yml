run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - revive
    - gosimple
    - ineffassign
    - unused
    - misspell
    - goimports
    - exhaustive
    - noctx
    - bodyclose

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/rekall/backend
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: indent-error-flow
      - name: error-strings
  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-dirs:
    - internal/infrastructure/asr/pb
    - vendor
  exclude-rules:
    # Test files: relaxed rules (mocks may be unused per-file, deadlines on
    # ephemeral conns don't need error checks, dialer responses in WS tests
    # are short-lived).
    - path: "_test.go"
      linters:
        - revive
        - errcheck
        - unused
        - bodyclose
