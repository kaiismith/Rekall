models:
  default: tiny.en
  entries:
    - id: tiny.en
      path: /var/lib/rekall-asr/models/ggml-tiny.en.bin
      language: en
      n_threads: 2
      beam_size: 3
      best_of: 3
      temperature: 0.0

server:
  ws_listen: "0.0.0.0:8081"
  grpc_listen: "0.0.0.0:9090"
  metrics_listen: "0.0.0.0:9091"
  allow_insecure_ws: true
  ws_allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

auth:
  token_audience: rekall-asr
  token_issuer: rekall-backend
  token_default_ttl_seconds: 180
  token_min_ttl_seconds: 60
  token_max_ttl_seconds: 300
  jti_cache_ttl_seconds: 600

worker_pool:
  size: 4

admission:
  inbound_audio_buffer_frames: 256
  outbound_event_buffer: 64
  backpressure_kill_ms: 5000
  outbound_drop_ms: 200

session:
  idle_timeout_seconds: 30
  hard_timeout_seconds: 1800
  graceful_drain_seconds: 30
  partial_emit_interval_ms: 150
  final_emit_max_latency_ms: 600
  audio_window_seconds: 4

logging:
  level: info
  format: json

telemetry:
  otel_endpoint: ""

# Transcription engine selection. `local` runs whisper.cpp in-process;
# `openai` uploads each VAD-bounded segment to OpenAI's transcription
# endpoint (slow CPU laptops can validate the captions flow without paying
# the whisper.cpp inference cost). The choice is operator-driven via this
# YAML / env vars only — never exposed to end-users in the frontend.
#
# In SERVER_ENV=production, mode=openai is refused unless
# ASR_ALLOW_OPENAI_IN_PRODUCTION=true is also set.
engine:
  mode: "openai"                          # local | openai
  openai:
    api_key_env:    "OPENAI_API_KEY"     # name of env var holding the secret
    base_url:       ""                   # "" → https://api.openai.com/v1/
    organization:   ""
    model:          "whisper-1"
    language:       "en"                 # BCP-47; "" → auto
    temperature:    0.0
    response_format: "verbose_json"      # "json" | "verbose_json" | "text"
    request_timeout_seconds: 30
    max_segment_seconds:     60
    min_segment_seconds:      1
    retries:                  2
    retry_backoff_ms:       500
